# docker-compose.yml (Development Environment)
services:
  postgresql_dwh:
    image: postgres:17
    container_name: postgresql_dwh
    env_file:
      - .env
    environment:
      # Using variable expansion with default values for easier setup
      POSTGRES_DB: ${POSTGRES_DB:-data_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      # Bind mounts for database initialization and development
      - ./scripts/init:/docker-entrypoint-initdb.d
      - ./scripts:/workspace/scripts
      - ./datasets:/workspace/datasets
      - ./tests:/workspace/tests
      # Named volume for persistent data storage
      - postgresql_data:/var/lib/postgresql/data
    restart: no
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgresql_data:
    name: postgresql_data
